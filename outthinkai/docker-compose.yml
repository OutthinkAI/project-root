services:
  db:
    image: postgres:16
    container_name: outthinkai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: outthinkai
      POSTGRES_PASSWORD: outthinkai
      POSTGRES_DB: outthinkai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outthinkai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: outthinkai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file: ./backend/.env

  frontend:
    build: ./frontend
    container_name: outthinkai-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data: